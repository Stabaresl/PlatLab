line-length = 100
target-version = "py312"
exclude = ["migrations"]

[lint]
select = ["E", "F", "I"]
# F401/F403/F405: los settings usan "from .base import *" a propósito
# (patrón estándar de Django para separar base/dev/prod).
per-file-ignores = { "config/settings/dev.py" = ["F401", "F403", "F405"], "config/settings/prod.py" = ["F401", "F403", "F405"] }
