name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias de dev
        run: pip install -r requirements/dev.txt

      - name: Lint (ruff)
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: platlab_test
          POSTGRES_USER: platlab
          POSTGRES_PASSWORD: platlab_test_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U platlab -d platlab_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: platlab_test
      POSTGRES_USER: platlab
      POSTGRES_PASSWORD: platlab_test_pw
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias de dev
        run: pip install -r requirements/dev.txt

      - name: Ejecutar tests (pytest-django)
        run: pytest -v
